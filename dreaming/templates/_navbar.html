<nav class="sticky top-0 z-30 bg-white/85 backdrop-blur border-b border-slate-200">
  <div class="max-w-[1400px] mx-auto px-6 py-3 flex items-center gap-4">
    <a href="/" class="flex items-center gap-2 font-semibold text-slate-900 hover:text-slate-700 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-blue-600" aria-hidden="true">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      <span class="text-sm tracking-tight">{{ "common.app_name" | t(locale=locale) }}</span>
    </a>

    {% if projects %}
    <div class="relative">
      <select onchange="(()=>{const slug=event.target.value; if(slug==='*'){location.href='/'} else if(slug==='+'){location.href='/projects?new=1'} else {const cur=location.pathname; const m=cur.match(/^\/p\/[^\/]+(\/.*)?$/); location.href='/p/'+slug+(m && m[1] ? m[1] : '/');}})()"
              class="appearance-none border border-slate-200 rounded-md pl-3 pr-8 py-1.5 text-sm bg-white hover:border-slate-300 transition-colors cursor-pointer focus:border-blue-500"
              aria-label="{{ 'navbar.all_projects' | t(locale=locale) }}">
        {% if request.state.project %}
          <option disabled>{{ request.state.project.label }}</option>
        {% endif %}
        <option value="*">● {{ "navbar.all_projects" | t(locale=locale) }}</option>
        {% for p in projects %}
          <option value="{{ p.slug }}"{% if request.state.project and request.state.project.id == p.id %} selected{% endif %}>{{ p.label }}</option>
        {% endfor %}
        <option value="+">{{ "navbar.add_project" | t(locale=locale) }}</option>
      </select>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" aria-hidden="true">
        <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
      </svg>
    </div>
    {% endif %}

    <div class="ml-auto flex items-center gap-1">
      <a href="/projects" class="text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-3 py-1.5 rounded-md transition-colors">{{ "projects.title" | t(locale=locale) }}</a>
      <a href="/settings" class="text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-3 py-1.5 rounded-md transition-colors">{{ "settings.title" | t(locale=locale) }}</a>
      <form method="post" action="/locale" class="ml-2 flex items-center border border-slate-200 rounded-md overflow-hidden bg-white">
        <input type="hidden" name="next" value="{{ request.url.path }}">
        <button name="locale" value="ru" type="submit"
                class="text-xs px-2.5 py-1.5 transition-colors {% if locale=='ru' %}bg-blue-600 text-white font-semibold cursor-default{% else %}text-slate-600 hover:bg-slate-100 cursor-pointer{% endif %}"
                {% if locale=='ru' %}disabled{% endif %}
                title="{% if locale=='ru' %}Текущий язык — русский{% else %}Переключить на русский{% endif %}">RU</button>
        <button name="locale" value="en" type="submit"
                class="text-xs px-2.5 py-1.5 border-l border-slate-200 transition-colors {% if locale=='en' %}bg-blue-600 text-white font-semibold cursor-default{% else %}text-slate-600 hover:bg-slate-100 cursor-pointer{% endif %}"
                {% if locale=='en' %}disabled{% endif %}
                title="{% if locale=='en' %}Current language is English{% else %}Switch to English{% endif %}">EN</button>
      </form>
    </div>
  </div>
</nav>
