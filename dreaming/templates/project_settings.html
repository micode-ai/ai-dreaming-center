{% extends "_project_layout.html" %}
{% set active='settings' %}
{% block project_content %}
<p class="muted mb-3">{{ "settings.project_hint" | t(locale=locale) }}</p>
<form method="post" action="/p/{{ project.slug }}/settings" class="space-y-6 max-w-3xl">
{% for group_name, rows in groups %}
  <fieldset class="bg-white p-4 rounded shadow">
    <legend class="text-sm font-semibold px-2">{{ group_name }}</legend>
    <div class="space-y-3">
    {% for r in rows %}
      <div class="border-b pb-2">
        <div class="text-xs font-mono mb-1">{{ r.key }}</div>
        <div class="text-xs muted mb-1">global: <code>{{ r.global }}</code></div>
        <label class="inline-flex items-center mr-3 text-xs">
          <input type="radio" name="action_{{ r.key }}" value="inherit" {% if not r.is_overridden %}checked{% endif %}>
          <span class="ml-1">inherit</span>
        </label>
        <label class="inline-flex items-center text-xs">
          <input type="radio" name="action_{{ r.key }}" value="override" {% if r.is_overridden %}checked{% endif %}>
          <span class="ml-1">override:</span>
          {% if r.is_bool %}
            <input type="hidden" name="value_{{ r.key }}" value="false">
            <input type="checkbox" name="value_{{ r.key }}" value="true"
                   {% if r.is_overridden and r.override %}checked{% endif %}
                   class="ml-2">
          {% else %}
            <input name="value_{{ r.key }}"
                   value="{{ r.override if r.is_overridden else '' }}"
                   class="border rounded p-1 ml-2 font-mono text-xs flex-1"
                   {% if 'token' in r.key or 'api_key' in r.key %}type="password" autocomplete="off"{% endif %}>
          {% endif %}
        </label>
      </div>
    {% endfor %}
    </div>
  </fieldset>
{% endfor %}
<button class="bg-blue-600 text-white rounded px-4 py-2">Save</button>
</form>
{% endblock %}
