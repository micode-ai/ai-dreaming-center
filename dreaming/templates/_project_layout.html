{% extends "base.html" %}
{% block content %}
<header class="mb-4 flex items-baseline gap-4">
  <h1 class="text-2xl font-bold">{{ project.label }}</h1>
  <span class="font-mono text-xs text-slate-500">{{ project.slug }}</span>
</header>
<nav class="flex gap-3 mb-6 text-sm border-b">
  <a class="py-2 {% if active=='dashboard' %}border-b-2 border-blue-600 text-blue-700 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
     href="/p/{{ project.slug }}/">{{ "p.dashboard" | t(locale=locale) }}</a>
  <a class="py-2 {% if active=='live' %}border-b-2 border-blue-600 text-blue-700 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
     href="/p/{{ project.slug }}/live">{{ "p.live" | t(locale=locale) }}</a>
  <a class="py-2 {% if active=='rotation' %}border-b-2 border-blue-600 text-blue-700 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
     href="/p/{{ project.slug }}/rotation">{{ "p.rotation" | t(locale=locale) }}</a>
  <a class="py-2 {% if active=='settings' %}border-b-2 border-blue-600 text-blue-700 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
     href="/p/{{ project.slug }}/settings">{{ "p.settings" | t(locale=locale) }}</a>
</nav>
{% block project_content %}{% endblock %}
{% endblock %}
